name: Deploy network app to VPS

on:
  push:
    branches: [main]
    paths:
      - network.samlatif.uk/**
      - shared/cv-data.json
      - .github/workflows/deploy-network-vps.yml
  workflow_dispatch:
    inputs:
      sync_local_db:
        description: "One-off: overwrite production SQLite DB with the staged local DB"
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-network-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./prisma/dev.db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: network.samlatif.uk/package-lock.json

      - name: Install dependencies
        working-directory: network.samlatif.uk
        run: npm ci

      - name: Prepare CI database
        working-directory: network.samlatif.uk
        run: npx prisma migrate deploy

      - name: Build
        working-directory: network.samlatif.uk
        run: npm run build

      - name: Prune to production dependencies
        working-directory: network.samlatif.uk
        run: npm prune --omit=dev

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "Missing required secret: VPS_SSH_KEY"
            exit 1
          fi
      - name: Validate DNS record exists
        run: |
          DOMAIN="${{ secrets.NETWORK_DOMAIN }}"
          DOMAIN="${DOMAIN:-network.samlatif.uk}"
          RESOLVED_IP="$(dig +short A "$DOMAIN" | tail -n 1)"
          if [ -z "$RESOLVED_IP" ]; then
            echo "DNS check failed: $DOMAIN does not resolve to an A record yet."
            echo "Create DNS first, then re-run deploy."
            exit 1
          fi
          echo "DNS check passed: $DOMAIN -> $RESOLVED_IP"
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          HOST="${{ secrets.VPS_HOST }}"
          HOST="${HOST:-79.99.45.146}"
          PORT="${{ secrets.VPS_PORT }}"
          PORT="${PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts
      - name: Ensure deploy directories exist
        run: |
          HOST="${{ secrets.VPS_HOST }}"
          HOST="${HOST:-79.99.45.146}"
          USER="${{ secrets.VPS_USER }}"
          USER="${USER:-root}"
          PORT="${{ secrets.VPS_PORT }}"
          PORT="${PORT:-22}"
          APP_PATH="${{ secrets.NETWORK_VPS_APP_PATH }}"
          APP_PATH="${APP_PATH:-/var/www/network.samlatif.uk/app}"
          SHARED_PATH="${{ secrets.NETWORK_VPS_SHARED_PATH }}"
          SHARED_PATH="${SHARED_PATH:-/var/www/network.samlatif.uk/shared}"
          DATA_PATH="${{ secrets.NETWORK_VPS_DATA_PATH }}"
          DATA_PATH="${DATA_PATH:-/var/www/network.samlatif.uk/data}"
          ssh -p "$PORT" "$USER@$HOST" "mkdir -p '$APP_PATH' '$SHARED_PATH' '$DATA_PATH'"
      - name: Sync app files
        run: |
          HOST="${{ secrets.VPS_HOST }}"
          HOST="${HOST:-79.99.45.146}"
          USER="${{ secrets.VPS_USER }}"
          USER="${USER:-root}"
          PORT="${{ secrets.VPS_PORT }}"
          PORT="${PORT:-22}"
          APP_PATH="${{ secrets.NETWORK_VPS_APP_PATH }}"
          APP_PATH="${APP_PATH:-/var/www/network.samlatif.uk/app}"
          SHARED_PATH="${{ secrets.NETWORK_VPS_SHARED_PATH }}"
          SHARED_PATH="${SHARED_PATH:-/var/www/network.samlatif.uk/shared}"
          rsync -az --delete \
            --exclude='node_modules' \
            --exclude='dev.db' \
            --exclude='prisma/dev.db' \
            -e "ssh -p $PORT" \
            "network.samlatif.uk/" \
            "$USER@$HOST:$APP_PATH/"
          rsync -az --delete \
            -e "ssh -p $PORT" \
            "network.samlatif.uk/node_modules/" \
            "$USER@$HOST:$APP_PATH/node_modules/"
          rsync -az \
            -e "ssh -p $PORT" \
            "shared/cv-data.json" \
            "$USER@$HOST:$SHARED_PATH/"
      - name: One-off sync staged local DB
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sync_local_db == 'true' }}
        run: |
          HOST="${{ secrets.VPS_HOST }}"
          HOST="${HOST:-79.99.45.146}"
          USER="${{ secrets.VPS_USER }}"
          USER="${USER:-root}"
          PORT="${{ secrets.VPS_PORT }}"
          PORT="${PORT:-22}"
          DATA_PATH="${{ secrets.NETWORK_VPS_DATA_PATH }}"
          DATA_PATH="${DATA_PATH:-/var/www/network.samlatif.uk/data}"
          if [ ! -f "network.samlatif.uk/.next/prisma/dev.db" ]; then
            echo "Missing staged DB: network.samlatif.uk/.next/prisma/dev.db"
            echo "Run 'npm run build; npm run db:stage-prod-seed' before triggering this workflow."
            exit 1
          fi
          ssh -p "$PORT" "$USER@$HOST" "set -e; mkdir -p '$DATA_PATH'; if [ -f '$DATA_PATH/dev.db' ]; then cp '$DATA_PATH/dev.db' '$DATA_PATH/dev.db.backup-$(date +%Y%m%d-%H%M%S)'; fi"
          rsync -az \
            -e "ssh -p $PORT" \
            "network.samlatif.uk/.next/prisma/dev.db" \
            "$USER@$HOST:$DATA_PATH/dev.db"
      - name: Migrate, restart service, and reload nginx
        run: |
          HOST="${{ secrets.VPS_HOST }}"
          HOST="${HOST:-79.99.45.146}"
          USER="${{ secrets.VPS_USER }}"
          USER="${USER:-root}"
          PORT="${{ secrets.VPS_PORT }}"
          PORT="${PORT:-22}"
          APP_PATH="${{ secrets.NETWORK_VPS_APP_PATH }}"
          APP_PATH="${APP_PATH:-/var/www/network.samlatif.uk/app}"
          DATA_PATH="${{ secrets.NETWORK_VPS_DATA_PATH }}"
          DATA_PATH="${DATA_PATH:-/var/www/network.samlatif.uk/data}"
          DOMAIN="${{ secrets.NETWORK_DOMAIN }}"
          DOMAIN="${DOMAIN:-network.samlatif.uk}"
          APP_PORT="${{ secrets.NETWORK_PORT }}"
          APP_PORT="${APP_PORT:-3100}"
          SERVICE_NAME="${{ secrets.NETWORK_SERVICE_NAME }}"
          SERVICE_NAME="${SERVICE_NAME:-network-samlatif-uk}"
          ssh -p "$PORT" "$USER@$HOST" "
            set -e
            cd '$APP_PATH'
            export DATABASE_URL='file:$DATA_PATH/dev.db'
            DB_FILE='$DATA_PATH/dev.db'
            DB_EXISTS_BEFORE=0
            if [ -f \"\$DB_FILE\" ]; then
              DB_EXISTS_BEFORE=1
            fi
            ./node_modules/.bin/prisma migrate deploy
            if [ \"\$DB_EXISTS_BEFORE\" -eq 0 ]; then
              node prisma/seed.mjs
            else
              echo 'Skipping seed: existing database detected.'
            fi
            printf '%s\n' \
              '[Unit]' \
              'Description=$SERVICE_NAME Next.js app' \
              'After=network.target' \
              '' \
              '[Service]' \
              'Type=simple' \
              'WorkingDirectory=$APP_PATH' \
              'Environment=NODE_ENV=production' \
              'Environment=PORT=$APP_PORT' \
              'Environment=DATABASE_URL=file:$DATA_PATH/dev.db' \
              'ExecStart=$APP_PATH/node_modules/.bin/next start --port $APP_PORT' \
              'Restart=always' \
              'RestartSec=5' \
              'User=root' \
              '' \
              '[Install]' \
              'WantedBy=multi-user.target' \
              > /etc/systemd/system/$SERVICE_NAME.service
            systemctl daemon-reload
            systemctl enable --now $SERVICE_NAME
            systemctl restart $SERVICE_NAME
            printf '%s\n' \
              'server {' \
              '  listen 80;' \
              '  server_name $DOMAIN;' \
              '' \
              '  location / {' \
              '    proxy_pass http://127.0.0.1:$APP_PORT;' \
              '    proxy_http_version 1.1;' \
              '    proxy_set_header Host \$host;' \
              '    proxy_set_header X-Real-IP \$remote_addr;' \
              '    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;' \
              '    proxy_set_header X-Forwarded-Proto \$scheme;' \
              '    proxy_set_header Upgrade \$http_upgrade;' \
              '    proxy_set_header Connection "upgrade";' \
              '  }' \
              '}' \
              > /etc/nginx/sites-available/$DOMAIN
            ln -sfn /etc/nginx/sites-available/$DOMAIN /etc/nginx/sites-enabled/$DOMAIN
            nginx -t
            systemctl reload nginx
            if command -v certbot >/dev/null 2>&1; then
              certbot --nginx -d $DOMAIN --non-interactive --agree-tos -m hello@samlatif.uk --redirect || true
            fi
          "
